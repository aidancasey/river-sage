name: Deploy to Production

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

  validate:
    name: Validate SAM Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Validate template
        run: sam validate --lint

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, validate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::831635640076:role/github-actions-river-sage
          aws-region: eu-west-1

      - name: Build Lambda functions
        run: sam build

      - name: Deploy infrastructure
        run: sam deploy --config-env production --no-confirm-changeset

      - name: Build web app
        run: |
          export VITE_API_BASE_URL=$(aws cloudformation describe-stacks \
            --stack-name river-data-scraper-prod --region eu-west-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`RiverGuruApiUrl`].OutputValue' \
            --output text)
          cd web && npm install && npm run build

      - name: Deploy web app to S3
        run: |
          aws s3 sync web/dist/ s3://river-guru-web-production/ \
            --region eu-west-1 \
            --delete \
            --cache-control "max-age=31536000,public"
