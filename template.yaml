AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Irish Rivers Data Scraper

  Serverless application that collects river data (flow, water level, temperature)
  from multiple sources including ESB Hydro PDFs and waterlevel.ie API,
  parses the data, and stores it in S3 for historical tracking and analysis.

# Global configuration for all resources
Globals:
  Function:
    Timeout: 120
    MemorySize: 256
    Runtime: python3.13
    Architectures:
      - arm64  # Graviton2 - 20% cheaper than x86
    Environment:
      Variables:
        ENVIRONMENT: production
        LOG_LEVEL: INFO

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Deployment environment

  S3BucketName:
    Type: String
    Default: river-data-ireland
    Description: Name for the S3 bucket to store river data

  ScheduleExpression:
    Type: String
    Default: "rate(1 hour)"
    Description: EventBridge schedule expression (e.g., "rate(1 hour)" or "cron(0 * * * ? *)")

  WebAppBucketName:
    Type: String
    Default: river-guru-web
    Description: Name for the S3 bucket to host the River Guru web application

  AllowedOrigin:
    Type: String
    Default: ""
    Description: Comma-separated list of allowed CORS origins for the alerts API (e.g. https://riverguru.ie)

Resources:
  # NOTE: S3 bucket for river data (river-data-ireland-prod) exists outside CloudFormation
  # Reference it directly using the S3BucketName parameter

  # IAM Role for Lambda function
  RiverDataCollectorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Basic Lambda execution (CloudWatch Logs)
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        # S3 permissions for the data bucket
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                  - s3:PutObjectAcl
                Resource:
                  - !Sub arn:aws:s3:::${S3BucketName}
                  - !Sub arn:aws:s3:::${S3BucketName}/*
        # SNS permissions for SMS alerts
        - PolicyName: SNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: "*"
      Tags:
        - Key: Project
          Value: IrishRiversDataScraper
        - Key: Environment
          Value: !Ref Environment

  # Lambda function for collecting river data
  RiverDataCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-collector
      Description: Downloads and processes river data (flow, level, temperature) from multiple sources
      CodeUri: .
      Handler: src.lambda_handler.lambda_handler
      Role: !GetAtt RiverDataCollectorRole.Arn
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref S3BucketName
          S3_REGION: !Ref AWS::Region
          S3_ENABLE_ENCRYPTION: "true"
          S3_STORAGE_CLASS: STANDARD
          # Data sources config — loaded from S3 at runtime (config/data_sources.json)
          DATA_SOURCES_S3_KEY: config/data_sources.json
      Events:
        # EventBridge scheduled trigger
        HourlySchedule:
          Type: Schedule
          Properties:
            Schedule: !Ref ScheduleExpression
            Description: Trigger river data collection hourly
            Enabled: true
      Tags:
        Project: IrishRiversDataScraper
        Environment: !Ref Environment
    Metadata:
      BuildMethod: makefile

  # ========================================
  # Phase 3: WhatsApp Flow Alerts
  # ========================================

  # IAM Role for Alerts API Lambda
  AlertsApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-alerts-api-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3AlertsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${S3BucketName}
                  - !Sub arn:aws:s3:::${S3BucketName}/alerts/*
      Tags:
        - Key: Project
          Value: RiverGuruWebApp
        - Key: Environment
          Value: !Ref Environment

  # Lambda function for Alerts API
  AlertsApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-alerts-api
      Description: Manages WhatsApp flow alert subscriptions (register, opt-in, status)
      CodeUri: .
      Handler: api.alerts_api.lambda_handler
      Role: !GetAtt AlertsApiLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref S3BucketName
          S3_REGION: !Ref AWS::Region
          LOG_LEVEL: INFO
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Events:
        RegisterPhone:
          Type: Api
          Properties:
            Path: /api/alerts/register
            Method: POST
            RestApiId: !Ref RiverGuruApi
        OptInToday:
          Type: Api
          Properties:
            Path: /api/alerts/optin
            Method: POST
            RestApiId: !Ref RiverGuruApi
        PostStatus:
          Type: Api
          Properties:
            Path: /api/alerts/status
            Method: POST
            RestApiId: !Ref RiverGuruApi
        OptionsRegister:
          Type: Api
          Properties:
            Path: /api/alerts/register
            Method: OPTIONS
            RestApiId: !Ref RiverGuruApi
        OptionsOptin:
          Type: Api
          Properties:
            Path: /api/alerts/optin
            Method: OPTIONS
            RestApiId: !Ref RiverGuruApi
        OptionsStatus:
          Type: Api
          Properties:
            Path: /api/alerts/status
            Method: OPTIONS
            RestApiId: !Ref RiverGuruApi
      Tags:
        Project: RiverGuruWebApp
        Environment: !Ref Environment
    Metadata:
      BuildMethod: makefile

  # CloudWatch Log Group for Alerts API Lambda
  AlertsApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AlertsApiFunction}
      RetentionInDays: 30

  # CloudWatch Log Group with retention
  RiverDataCollectorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${RiverDataCollectorFunction}
      RetentionInDays: 30

  # SNS Topic for alarm notifications
  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AWS::StackName}-alarms
      Subscription:
        - Protocol: email
          Endpoint: '{{resolve:ssm:/river-data-scraper/alert-email}}'

  # CloudWatch Alarm for Lambda errors
  RiverDataCollectorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-lambda-errors
      AlarmDescription: Alert when Lambda function encounters errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 3600  # 1 hour
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref RiverDataCollectorFunction
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic

  # CloudWatch Alarm for Lambda throttling
  RiverDataCollectorThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-lambda-throttles
      AlarmDescription: Alert when Lambda function is throttled
      MetricName: Throttles
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref RiverDataCollectorFunction
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic

  # ========================================
  # Phase 2: River Guru Web App Resources
  # ========================================

  # NOTE: S3 bucket for web app (river-guru-web-production) exists outside CloudFormation
  # Reference it directly using the WebAppBucketName parameter

  # IAM Role for Data API Lambda function
  DataApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-data-api-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${S3BucketName}
                  # Explicitly scoped to river data prefixes — alerts/ (subscriber PII) is excluded
                  - !Sub arn:aws:s3:::${S3BucketName}/aggregated/*
                  - !Sub arn:aws:s3:::${S3BucketName}/parsed/*
                  - !Sub arn:aws:s3:::${S3BucketName}/raw/*
      Tags:
        - Key: Project
          Value: RiverGuruWebApp
        - Key: Environment
          Value: !Ref Environment

  # Lambda function for Data API
  DataApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-data-api
      Description: REST API for accessing river flow data
      CodeUri: api/
      Handler: data_api.lambda_handler
      Role: !GetAtt DataApiLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref S3BucketName
          S3_REGION: !Ref AWS::Region
          LOG_LEVEL: INFO
      Events:
        # API Gateway event for /latest endpoint
        GetLatestFlow:
          Type: Api
          Properties:
            Path: /api/flow/latest
            Method: GET
            RestApiId: !Ref RiverGuruApi
        # API Gateway event for /history endpoint
        GetHistoricalFlow:
          Type: Api
          Properties:
            Path: /api/flow/history
            Method: GET
            RestApiId: !Ref RiverGuruApi
        # OPTIONS for CORS preflight
        OptionsLatest:
          Type: Api
          Properties:
            Path: /api/flow/latest
            Method: OPTIONS
            RestApiId: !Ref RiverGuruApi
        OptionsHistory:
          Type: Api
          Properties:
            Path: /api/flow/history
            Method: OPTIONS
            RestApiId: !Ref RiverGuruApi
      Tags:
        Project: RiverGuruWebApp
        Environment: !Ref Environment

  # CloudWatch Log Group for Data API Lambda
  DataApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${DataApiFunction}
      RetentionInDays: 30

  # API Gateway REST API
  RiverGuruApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub ${AWS::StackName}-api
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      # Throttle all routes: max 2 requests/sec sustained, burst of 5
      # Prevents abuse of the unauthenticated alerts endpoints
      MethodSettings:
        - HttpMethod: "*"
          ResourcePath: "/*"
          ThrottlingRateLimit: 2
          ThrottlingBurstLimit: 5
      Tags:
        Project: RiverGuruWebApp
        Environment: !Ref Environment

Outputs:
  # Lambda Function
  RiverDataCollectorFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt RiverDataCollectorFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-function-arn

  RiverDataCollectorFunctionName:
    Description: Name of the Lambda function
    Value: !Ref RiverDataCollectorFunction
    Export:
      Name: !Sub ${AWS::StackName}-function-name

  # S3 Bucket (exists outside CloudFormation)
  RiverDataBucketName:
    Description: Name of the S3 bucket for river data
    Value: !Ref S3BucketName
    Export:
      Name: !Sub ${AWS::StackName}-bucket-name

  RiverDataBucketArn:
    Description: ARN of the S3 bucket
    Value: !Sub arn:aws:s3:::${S3BucketName}
    Export:
      Name: !Sub ${AWS::StackName}-bucket-arn

  # CloudWatch
  LogGroupName:
    Description: CloudWatch Log Group for Lambda function
    Value: !Ref RiverDataCollectorLogGroup

  # URLs
  S3ConsoleUrl:
    Description: URL to S3 bucket in AWS Console
    Value: !Sub https://s3.console.aws.amazon.com/s3/buckets/${S3BucketName}

  LambdaConsoleUrl:
    Description: URL to Lambda function in AWS Console
    Value: !Sub https://console.aws.amazon.com/lambda/home?region=${AWS::Region}#/functions/${RiverDataCollectorFunction}

  CloudWatchLogsUrl:
    Description: URL to CloudWatch Logs
    Value: !Sub https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:log-groups/log-group/${RiverDataCollectorLogGroup}

  # Phase 2: River Guru Web App Outputs
  RiverGuruApiUrl:
    Description: API Gateway endpoint URL for River Guru Data API
    Value: !Sub https://${RiverGuruApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-api-url

  RiverGuruWebBucketName:
    Description: Name of the S3 bucket hosting River Guru web app
    Value: !Sub ${WebAppBucketName}-${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-web-bucket-name

  RiverGuruWebsiteUrl:
    Description: URL for River Guru web application
    Value: !Sub http://${WebAppBucketName}-${Environment}.s3-website-${AWS::Region}.amazonaws.com
    Export:
      Name: !Sub ${AWS::StackName}-web-url

  DataApiFunctionName:
    Description: Name of the Data API Lambda function
    Value: !Ref DataApiFunction
    Export:
      Name: !Sub ${AWS::StackName}-data-api-name

  DataApiFunctionArn:
    Description: ARN of the Data API Lambda function
    Value: !GetAtt DataApiFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-data-api-arn
